services:
  # 🚀 Backend API Service
  - type: web
    name: garagenow-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: garagenow-secrets # Optional: Use environmental group for shared secrets

  # 🎨 Frontend Web Service (Next.js)
  - type: web
    name: garagenow-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://garadge-2-0.onrender.com/api
      - key: NEXT_PUBLIC_SOCKET_URL
        value: https://garadge-2-0.onrender.com
